# =============================================================================
# YouTube Viewer — Docker Compose WITH WireGuard VPS Tunnel
# =============================================================================
# This is a COMPLETE standalone docker-compose file. It includes everything
# from docker-compose.yml PLUS the WireGuard tunnel configuration.
#
# Usage (Arcane / Web UI):
#   1. First deploy the VPS receiver — see README.md for the one-command setup.
#   2. Copy the keys from the VPS output.
#   3. Create a new stack in Arcane.
#   4. Paste this file into the Compose field.
#   5. Paste .env.example into the Environment field.
#   6. Fill in YOUTUBE_URLS and the tunnel settings (VPS_IP, WG_SERVER_PUBLIC_KEY,
#      WG_CLIENT_PRIVATE_KEY) from the VPS output.
#   7. Click Deploy. Docker pulls all images and creates networks/volumes
#      automatically — no cloning, no building, no extra commands.
#
# Usage (Docker CLI):
#   docker-compose -f docker-compose.tunnel.yml up -d
#
# Architecture:
#   ytviewer → tor → wg-tunnel ═══WireGuard═══▶ VPS (wg-server) → Internet
#           ytnet
#
# Required .env variables for tunnel:
#   VPS_IP                — Public IP of your VPS
#   WG_SERVER_PUBLIC_KEY  — WireGuard server public key (from VPS setup)
#   WG_CLIENT_PRIVATE_KEY — WireGuard client private key (from VPS setup)
# =============================================================================

version: '3'

services:
  wg-tunnel:
    image: ghcr.io/dfhdrfhrdehrdhrdfh/youtube-viewer-wg:${WG_IMAGE_TAG:-latest}
    container_name: wg-tunnel
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    environment:
      - VPS_IP=${VPS_IP:?VPS_IP must be set to your VPS public IP address}
      - VPS_WG_PORT=${VPS_WG_PORT:-51821}
      - WG_CLIENT_PRIVATE_KEY=${WG_CLIENT_PRIVATE_KEY:?WG_CLIENT_PRIVATE_KEY must be set — get it from the VPS setup output}
      - WG_SERVER_PUBLIC_KEY=${WG_SERVER_PUBLIC_KEY:?WG_SERVER_PUBLIC_KEY must be set — get it from the VPS setup output}
    networks:
      - ytnet
    healthcheck:
      # Verify both WireGuard peer reachability AND that external traffic exits via VPS
      test: ["CMD-SHELL", "ping -c1 -W3 10.13.13.1 >/dev/null 2>&1 && EXT_IP=$(curl -s --max-time 5 https://api.ipify.org 2>/dev/null) && [ \"$EXT_IP\" = \"$VPS_IP\" ]"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 15s

  tor:
    image: ghcr.io/dfhdrfhrdehrdhrdfh/youtube-viewer-tor:${TOR_IMAGE_TAG:-latest}
    container_name: tor-proxy
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    depends_on:
      wg-tunnel:
        condition: service_healthy
    environment:
      - TOR_START_PORT=${TOR_START_PORT:-9052}
      - TOR_NUM_PORTS=${BATCH_COUNT:-6}
      # Default true — this file is the tunnel variant
      - TUNNEL_ENABLED=${TUNNEL_ENABLED:-true}
      - TUNNEL_GATEWAY=wg-tunnel
      - VPS_IP=${VPS_IP}
    volumes:
      - tor-data:/var/lib/tor
    networks:
      - ytnet
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'Bootstrapped 100%' /tmp/tor_bootstrap.log 2>/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  ytviewer:
    image: ghcr.io/dfhdrfhrdehrdhrdfh/youtube-viewer:${IMAGE_TAG:-latest}
    container_name: youtube-viewer
    restart: unless-stopped
    depends_on:
      tor:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - YOUTUBE_URLS=${YOUTUBE_URLS}
      - TOR_ENABLED=${TOR_ENABLED:-true}
      - TOR_HOST=tor
      - TOR_START_PORT=${TOR_START_PORT:-9052}
      - BATCH_COUNT=${BATCH_COUNT:-6}
      - TOTAL_COUNT=${TOTAL_COUNT:-96}
      - VIEW_ACTION_COUNT=${VIEW_ACTION_COUNT:-10}
      - VIEW_DURATION=${VIEW_DURATION:-50}
      - PAGE_DEFAULT_TIMEOUT=${PAGE_DEFAULT_TIMEOUT:-600}
      - YOUTUBE_VIEWER_FORCE_DEBUG=${YOUTUBE_VIEWER_FORCE_DEBUG:-false}
      # Default true — this file is the tunnel variant
      - TUNNEL_ENABLED=${TUNNEL_ENABLED:-true}
      - VPS_IP=${VPS_IP}
    networks:
      - ytnet

networks:
  ytnet:
    driver: bridge

volumes:
  tor-data:
