version: '3'

services:
  tor:
    image: ghcr.io/dfhdrfhrdehrdhrdfh/youtube-viewer-tor:${TOR_IMAGE_TAG:-latest}
    container_name: tor-proxy
    restart: unless-stopped
    environment:
      - TOR_START_PORT=${TOR_START_PORT:-9052}
      - TOR_NUM_PORTS=${BATCH_COUNT:-6}
      - TUNNEL_ENABLED=${TUNNEL_ENABLED:-false}
    volumes:
      - tor-data:/var/lib/tor
    networks:
      - viewernet
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'Bootstrapped 100%' /tmp/tor_bootstrap.log 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 45s

  npc-viewers:
    image: ghcr.io/dfhdrfhrdehrdhrdfh/youtube-viewer:${IMAGE_TAG:-latest}
    container_name: npc-viewers
    restart: unless-stopped
    depends_on:
      tor:
        condition: service_started
    environment:
      - NODE_ENV=production
      - VIDEO_URLS=${VIDEO_URLS}
      - TOR_ENABLED=${TOR_ENABLED:-true}
      - TOR_HOST=tor
      - TOR_START_PORT=${TOR_START_PORT:-9052}
      - BATCH_COUNT=${BATCH_COUNT:-6}
      - TOTAL_COUNT=${TOTAL_COUNT:-96}
      - VIEW_ACTION_COUNT=${VIEW_ACTION_COUNT:-10}
      - VIEW_DURATION=${VIEW_DURATION:-50}
      - PAGE_DEFAULT_TIMEOUT=${PAGE_DEFAULT_TIMEOUT:-600}
      - NPC_VIEWERS_FORCE_DEBUG=${NPC_VIEWERS_FORCE_DEBUG:-false}
      - TUNNEL_ENABLED=${TUNNEL_ENABLED:-false}
    networks:
      - viewernet
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').connect('/tmp/ytviewer.sock').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

networks:
  viewernet:
    driver: bridge

volumes:
  tor-data:
