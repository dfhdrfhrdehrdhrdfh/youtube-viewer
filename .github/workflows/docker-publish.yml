name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - beta

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine image tag from branch
        id: branch-tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "beta" ]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for npc-viewers image
        id: meta-viewer
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/npc-viewers
          tags: |
            type=sha
            type=raw,value=${{ steps.branch-tag.outputs.tag }}

      - name: Build and push npc-viewers image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta-viewer.outputs.tags }}
          labels: ${{ steps.meta-viewer.outputs.labels }}

      - name: Extract metadata for tor image
        id: meta-tor
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/npc-viewers-tor
          tags: |
            type=sha
            type=raw,value=${{ steps.branch-tag.outputs.tag }}

      - name: Build and push tor image
        uses: docker/build-push-action@v5
        with:
          context: ./tor
          push: true
          tags: ${{ steps.meta-tor.outputs.tags }}
          labels: ${{ steps.meta-tor.outputs.labels }}

      - name: Extract metadata for wg-tunnel image
        id: meta-wg
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/npc-viewers-wg
          tags: |
            type=sha
            type=raw,value=${{ steps.branch-tag.outputs.tag }}

      - name: Build and push wg-tunnel image
        uses: docker/build-push-action@v5
        with:
          context: ./wg-tunnel
          push: true
          tags: ${{ steps.meta-wg.outputs.tags }}
          labels: ${{ steps.meta-wg.outputs.labels }}

      - name: Extract metadata for vps image
        id: meta-vps
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/npc-viewers-vps
          tags: |
            type=sha
            type=raw,value=${{ steps.branch-tag.outputs.tag }}

      - name: Build and push vps image
        uses: docker/build-push-action@v5
        with:
          context: ./vps
          push: true
          tags: ${{ steps.meta-vps.outputs.tags }}
          labels: ${{ steps.meta-vps.outputs.labels }}
